version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: bigbet-mf-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: bigbet-mf
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bigbet-network

  backend:
    build: ./backend
    container_name: bigbet-mf-backend
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/bigbet-mf
      JWT_SECRET: your_super_secret_key_change_in_production
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - bigbet-network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    container_name: bigbet-mf-frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - bigbet-network
    volumes:
      - ./frontend/src:/app/src

volumes:
  mongodb_data:

networks:
  bigbet-network:
    driver: bridge
